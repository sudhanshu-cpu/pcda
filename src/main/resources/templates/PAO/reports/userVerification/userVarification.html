<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/login/head}"></head>
<link rel="stylesheet" type="text/css" th:href="@{/css/common/popup/jquery.popup.css}">
<script th:src="@{/js/common/popup/jquery.popup.js}"></script>
<script
	th:src="@{/js/PAO/userVarification/userVarification.js(random=${session.jsToken})}">
</script>
<script type="text/javascript">
	$(document).ready(function () {
		$(".js__p_start").simplePopup();
	});
	
	
	function takeMasterMissingComment(personalNo) {
	
$.ajax(
			{
				url: $("#context_path").val() + "pao/userVerificationHistory",
				data: {personalNo: personalNo},
				method: "post",
				async: false,
				success: function (result) {
			
					 $("#voucher_Ack_History_Id").html(result.trim());
					$(".js__p_start").click();

				}
		});


			}
	
</script>
<body>
	<div th:insert="~{fragments/header/mainHeader}"></div>
	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1"></div>
				<div class="col-lg-10">

					<div id="program" class="programBlock">
						<div class="welcomebox">
							<div class="welcomeHead">
								<p>
									<span
										th:text="#{pao.travel.request.generating.varification.re}"></span>
								</p>
							</div>
							<form name="userVerificationRprtFilter"
								id="userVerificationRprtFilter"
								th:action="@{/pao/getPaoUserReportData}" method="post">
								<div class="welcomecont">
									<table class="filtersearch">
										<tbody class="all1">

											<tr>
												<td th:text="#{pao.travel.request.from.date}"></td>
												<td><input name="frmBookingDt" type="text"
													id="frmBookingDt" class="txtfldM" size="15"
													readonly="readonly" th:value="${formData.frmBookingDt}"></td>

												<td th:text="#{pao.travel.request.to.date}"></td>
												<td><input name="toBookingDt" type="text"
													id="toBookingDt" class="txtfldM" size="15"
													readonly="readonly" th:value="${formData.toBookingDt}"></td>
											
												<td th:text="#{pao.travel.request.personal.no}"></td>
												<td colspan="4"><input name="personal" type="text"
													id="personal" size="15" th:value="${formData.personal}" autocomplete="off"></td>
											</tr>
											<tr>
												<td colspan="8" id="downLoadFile" style="text-align:right"><a
													href="#"><input type="button" value="Generate Report"
														class="butn" onclick="doGenerate();"></a></td>
											</tr>
										</tbody>
									</table>
								</div>
							</form>
							<form name="verifiMissDes" id="verifiMissDes"
								th:action="@{/pao/verifiMissDes}" method="post">
								<div th:if="${not #lists.isEmpty(reportData)}">
											<table id="userVerificationDetailsTRResult" class="filtersearch">
												<tbody class="all1">
												<tr>
													<td style="font-size: 17px; font-family: times new roman;background-color:#0AEFFE">Select All <input type="checkbox"
														id="select_all"
														onchange="selectORDeselectUsrCheckbox(this)" /></td>
												</tr>

												<tr>
													<td>
														<table id="outstandingDetailsTR" class="filtersearch">
															<tbody class="all1">
															<tr>
																<td colspan="10" id="records" class="normalbgback"><div id="currRecords"
																		class="showalert"></div></td>
															</tr>

															<tr>
																<td style='white-space: nowrap;'>Select</td>
																<td style='white-space: nowrap;'>Remarks(*)</td>
																<td style='white-space: nowrap;'>Personal No.</td>
																<td style='white-space: nowrap;'>Creation Date</td>
																<td style='white-space: nowrap;'>Full Name</td>
																<td style='white-space: nowrap;'>Unit Name</td>
																<td style='white-space: nowrap;'>Service</td>
																<td style='white-space: nowrap;'>Level</td>
																<td style='white-space: nowrap;'>Category</td>
																<td>Status</td>
															</tr>
															<tr th:each="eachRecord:${reportData}">
	<td><input th:attr="onchange='onChangeUserCheckbox(this, \''+${eachRecordStat.index}+'\')'"	type="checkbox"	th:id="@{|usr_${eachRecordStat.index}|}"th:name="@{|usr_checkbox${eachRecordStat.index}|}" />
																	<input type="hidden" name="usr_checkbox"></td>
		<td style="white-space: nowrap"><input type="text" size="15"	maxlength="100" disabled="disabled"	th:id="@{|remark_${eachRecordStat.index}|}"	th:name="@{|comment_${eachRecordStat.index}|}" autocomplete="off"> 
		<a 	href="#" th:attr="onclick='takeMasterMissingComment(\''+${eachRecord.personalNo}+'\')'">History</a>
																</td>
		<td style='white-space: nowrap;'><span th:text="${eachRecord.personalNo}"></span>
		 <input	type="hidden" th:name="@{|comment_${eachRecordStat.index}|}" th:value="${eachRecord.personalNo}">
		  <input type="hidden"	th:name="@{|userId_${eachRecordStat.index}|}" th:value="${eachRecord.userId}"> 
		  <input type="hidden" th:name="@{|profileStatus_${eachRecordStat.index}|}" th:value="${eachRecord.profileStatus}"></td>
																<td style='white-space: nowrap;'><span	th:text="${eachRecord.creationDateFormate}"></span></td>
																<td style='white-space: nowrap;'><span th:text="${eachRecord.fullName}"></span></td>
																<td style='white-space: nowrap;'><span th:text="${eachRecord.unitName}"></span></td>
																<td style='white-space: nowrap;'><span 	th:text="${eachRecord.serviceName}"></span></td>
																<td style='white-space: nowrap;'><span
																	th:text="${eachRecord.levelName}"></span></td>
																<td style='white-space: nowrap;'><span
																	th:text="${eachRecord.categoryName}"></span></td>
																<td><span th:text="${eachRecord.profileStatusStr}"></span></td>

															</tr>
														</tbody>
														</table>
													</td>
												</tr>

												<tr>
													<td colspan="3" style="text-align:right;">
	<a href="#"><input class="butn" type="submit"	th:formaction="@{/pao/fileUpload}" th:formmethod="post"	value="File Upload" /></a> 
	<a href="#"> <input class="butn" th:formaction="@{/pao/downloadpaouserreport}"	th:formmethod="post" type="submit" value="Download" />
													</a> <input type="hidden" name="chekArr" id="chkarr"> 
													<a href="#">
							<input class="butn"	type="button"	th:attr="onclick='doSelectedAction(\''+'MasterMissing'+'\')'"	value="Master Missing" /></a> 
							<input type="hidden" name="userAction" id="action"> <a href="#">
							<input class="butn" type="button" th:attr="onclick='doSelectedAction(\''+'Verified'+'\')'"	value="Verified" /></a></td>

												</tr>
									</tbody>
								</table>
								
										</div>
								
								
							
										<div id="nouserVerificationDetailsTRResult">
											<p class="errors" th:text="${listEmpty}"></p>
											</div>
									
							</form>
						</div>
					</div>
				</div>

				</div>
				</div>
	</section>
		<section>
<div class="blank"></div>
</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>
</body>

<div class="p_anch">
	<a href="javascript:void(0);" class="js__p_start">&#160;</a>
</div>
<div class="p_body js__p_body js__fadeout">&#160;</div>
<div class="popup js__popup js__slide_top">
	<a href="javascript:void(0);" class="js__p_close" title="Close">
		<img th:src="@{/images/close.png}" alt="Close" width="20" height="20" title="Close" align="right" />
	</a>
	<div class="p_content" id="voucher_Ack_History_Id"></div>
</div>

</html>
