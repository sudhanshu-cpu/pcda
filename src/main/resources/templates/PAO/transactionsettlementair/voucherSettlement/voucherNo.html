<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>
<script th:src="@{/js/PAO/transactionsettlementair/vouchersettlement/vouchersettlement.js(random=${session.jsToken})}"></script>
<body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">
	<div th:insert="~{fragments/header/mainHeader}"></div>

	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1"></div>
				<div class="col-lg-10">
					<form th:action="@{saveSettlement}" method="post"
						id="saveSettlement" name="saveSettlement">
						<div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;">
								<div class="welcomeHead">
									<p>Voucher Settlement</p>

								</div>
								<div class="welcomecont">
									<table class="filtersearch" id="outstandingDetailsTR">
										<tbody class="all1">
										<tr th:unless="!${errors} ==null">
												<td colspan="4"><p th:text="${errors}" class="errors"
														style="margin: 0"></p></td>
										</tr>
											<tr>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.vno}"></td>
												<td><span th:text="${vocherNoData.voucherNo}">
												</span> <input type="hidden" th:value="${vocherNoData.voucherNo}"
													name="voucherNo"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.creation}">
												</td>
												<td th:text="${vocherNoData.creationTime}"></td>
											</tr>
											<tr>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.vstatus}"></td>
												<td th:text="${vocherNoData.voucherStatus}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.balance}"></td>
												<td th:text="${vocherNoData.balanceAvailable}"></td>
											</tr>
											<tr>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.total}"></td>
												<td th:text="${vocherNoData.totalAmount}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.baltotal}"></td>
												<td><span th:text="${vocherNoData.balanceTotalAmount}">
												</span> <input type="hidden"
													th:value="${vocherNoData.balanceTotalAmount}"
													id="balanceAmount"></td>
											</tr>
											<tr>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.outstanding}"></td>
												<td th:text="${vocherNoData.outstandingAmount}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.boa}"></td>
												<td th:text="${vocherNoData.balanceOutstandingAmount}">
												</td>
											</tr>
											<tr>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.remark}"></td>
												<td colspan="3" th:text="${vocherNoData.remark}"></td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>
							<div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;">
									<div class="welcomeHead">
										<p th:text="#{pao.transactionsettlement.vouchersettlement.det}"></p>
									</div>
									<div class="welcomecont">
									<table class="filtersearch" id="outstandingDetailsTR">
											<tbody class="all1">
												<tr>
												<td><b><span
														th:text="#{pao.transactionsettlement.vouchersettlement.settle}"></span></b>
													<input type="text" name="amountToSettle" class="txtfldM"
													autocomplete="off" id="amountToSettle" readonly="readonly">
													</td>
												<td><b><span
														th:text="#{pao.transactionsettlement.vouchersettlement.utrno}">
													</span><span class="text-danger">*</span></b> <input type="text"
													name="utrNumber" id="utrNumber" class="txtfldM"
													autocomplete="off" maxlength=30></td>
												<td><b><span
														th:text="#{pao.transactionsettlement.vouchersettlement.utrdate}">
													</span><span class="text-danger">*</span></b> <input type="text"
													name="trDate" readonly="readonly" id="datevoucher"
													class="txtfldM" autocomplete="off"> <input
													type="hidden" name="txnIds" id="txnsId" value="" /></td>
												</tr>
											</tbody>
										</table>
									</div>
								</div>
							</div>
						<div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;">
								<div class="welcomecont">
									<table class="filtersearch" id="outstandingDetailsTR">
										<tbody class="all1">
											<tr>
												<td class="lablevalue"><span class="d-flex"
													style="float: right; column-gap: 0.5rem">Select All
														<input type="checkbox" id="select_all"
														onchange="selectORDeselect(this)" />
												</span></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.txnId}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.travelerName}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.personalNo}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.unit}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.outstanding}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.dueAmount}"></td>
												<td class="lablevalue"
													th:text="#{pao.transactionsettlement.vouchersettlement.txnPaymentStatus}"></td>


											</tr>
										</tbody>
										<tbody class="all1"
											th:each=" src,stat : ${vocherNoData.voucherDetails}">
											<tr>
												<td th:if="${src.txnPaymentStatus} == 'Pending'">
													<input name="recordchkbox"
						                     	th:value="${src.txnId}+'|'+${src.dueAmount}"
		                                        type="checkbox" th:id="@{|record_${stat.index}|}" onchange="checkBoxIndividual()" />
												</td>
												<td th:unless="${src.txnPaymentStatus} == 'Pending'">
												<input name="recordchkbox"
						                     	th:value="${src.txnId}+'|'+${src.dueAmount}"
		                                        type="checkbox" th:id="@{|record_${stat.index}|}" readonly="readonly" style="display:none" />
												</td>
												<td><span th:text="${src.txnId}"> </span></td>
												<td><span th:text="${src.travelerName}"> </span></td>
												<td><span th:text="${src.personalNo}"></span></td>
												<td><span th:text="${src.unit}"> </span></td>
												<td><span th:text="${src.outstandingAmount}"> </span></td>
												<td><span th:text="${src.dueAmount}"> </span></td>
												<td><span th:text="${src.txnPaymentStatus}"> </span></td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>

							<div style="text-align: right; width: 100%">
								<button class="butn" type="button" onclick="formsubmit(this);">Submit
								</button>
							</div>
						</div>

					</form>
				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>
</body>

</html>
