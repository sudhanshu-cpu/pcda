<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"> </head>
<script>


function doGenerate()
{
var reason = $("#disaproveReason").val().trim();

	if(reason==""){
	alert("Please Enter Reason for Cancellation");
	return false;
	}
	else{
	$("#cancelReqForm").submit();
	}
	}
</script>
   <body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">
	
		<div th:insert="~{fragments/header/mainHeader}"> </div>

 <section id="midpart" class="midpart">
			<div class="container-fluid">
				<div class="row">
					<div class="col-lg-1"></div>
					<div class="col-lg-10">
 <form th:action="@{/mb/cancelNormalRequest}" th:method="post" id="cancelReqForm" name="cancelReqForm">
 <input type="hidden" name="requestId" th:value="${reqId}"> 
 <input type="hidden" name="paxSeqNo" th:value="${sequenceNo}"> 
  <input type="hidden" name="cancelReqType" th:value="${cancelRequestType}"> 
 <div id="cancelDiv" >
<div id="program" class="programBlock">
							<div class="welcomebox">
								<div class="welcomeHead">
									<p>
										Cancel Request Reason
									</p>
								</div>
								<div class="welcomecont" >
 
 	<table id="loginForm" class="filtersearch" cellpadding="4" cellspacing="1" width="100%" border="0">
	 <tbody class="all1">
	 <tr>
		 <td align="left"><input type="text" style="border:1px solid #ccc; width:70%; height:100px;" id="disaproveReason"  name="reasonForDisapprove"
		 autocomplete="off"/></td>
 	 </tr>
	 <tr>
		 <td style="text-align:right"><input type="button" class="butn" value="Submit" onclick="doGenerate();"/></td>
	 </tr>
	 </tbody>
	 </table>


</div>
					</div>
				</div>
			</div>
</form>
</div>
</div>
</div>
				
 </section>
 <section>
	<div class="blank"></div>
	</section>
	<section>
    <div th:insert="~{fragments/login/footer}"></div>
    </section>
</body>
</html>
