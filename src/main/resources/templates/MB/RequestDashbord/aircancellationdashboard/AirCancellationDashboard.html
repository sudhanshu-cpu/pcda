<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>

<script th:src="@{/js/MB/RequestDashBoard/aircancellationdashboard/aircandash.js(random=${session.jsToken})}"> </script>
<body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">
	<div th:insert="~{fragments/header/mainHeader}"></div>


	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1"></div>
				<div class="col-lg-10">

					<div id="program" class="programBlock">
						<div class="welcomebox">
							<div class="welcomeHead">
								<p>
									Bookings For Cancellation</p>
							</div>
							<div class="welcomecont" th:unless="${#lists.isEmpty(modelList)}">
							<form th:action="@{/mb/getAirDashDataFrmBkgId}" method="post" name="airCanDashPage" id="airCanDashPage" >
							<input type="hidden" name="bookingId" id="bookingId" value="">
								<table class="filtersearch" cellspacing="1" cellpadding="4" width="100%" border="0">
									<tbody class="all1">
										<tr class="lablevalue">
											<td>SN#</td>
											<td>Booking Transaction Id</td>
											<td>Booking Id</td>
											<td>Request Id</td>
											<td>Origin</td>
											<td>Destination</td>
											<td>Journey Date</td>
											<td>Total Amount</td>
											<td>Booking Status</td>
											<td>Cancellation Approval Status</td>
										</tr>

										<tr th:each="src,stat :${modelList}">
											<td><span th:text="${stat.index+1}"></span></td>
											<td>
												<a href="#"
													th:attr="onclick='getCancelPage(\''+${src.bookingId}+'\');'">
													<span th:text="${src.operatorTxnId}"></span>
												</a>
											</td>
											<td><span th:text="${src.bookingId}"></span></td>
											<td><span th:text="${src.requestId}"></span></td>
											<td><span th:text="${src.originName}"></span></td>
											<td><span th:text="${src.destinationName}"></span></td>
											<td><span th:text="${src.journeyDate}"></span></td>
											<td>Rs. <span th:text="${src.totalInvoice}"></span></td>
											<td><span th:text="${src.currentBookingStatus}"></span></td>
											<td><span th:text="${src.canApproved}"></span></td>
										</tr>

									</tbody>
								</table>
							</form>
							</div>
							<div th:if="${#lists.isEmpty(modelList)}">
							<p class="errors" style="margin-bottom:0">No Booking Found For Cancellation..</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>
</body>

</html>
