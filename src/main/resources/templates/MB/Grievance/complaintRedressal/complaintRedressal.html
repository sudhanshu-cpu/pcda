<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>

<script type="text/javascript" th:src="@{/js/common/crypto.js}"></script>


<body>
	<div th:insert="~{fragments/header/mainHeader}"></div>
	<script th:src="@{/js/MB/Grievance/complaintRedressal/grievance.js(random=${session.jsToken})}"></script>
	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1"></div>
				<div class="col-lg-10">

					<div id="program" class="programBlock" style="padding-left: 100px; padding-right: 100px;">
						<form th:action="@{/mb/saveGrievance}" method="post" id="SaveForm"
							enctype="multipart/form-data">

							
							<span th:text="${message}" style="color: red;"> </span>
							<div class="welcomebox">
								<div class="welcomeHead">
									<span>Query Redressal Module</span>
								</div>
								<div class="welcomecont">
									<table class="filtersearch" id="grievanceTable">
										<tbody class="all1">
											<tr>
												<td style="width: 20%"><span>Type of Query</span><span
														class="mandatory"> *</span><span class="mandatory"></span></td>
												<td>
													<nav class="navbar navbar-expand-lg bg-light">
														<div class="container-fluid">
															<div class="collapse navbar-collapse"
																id="navbarSupportedContent">
																<ul class="navbar-nav me-auto mb-2 mb-lg-0"
																	id="categoryId"></ul>
															</div>
														</div>
													</nav>
												</td>
											</tr>

											<tr>
												<td>Selected Query</td>
												<td id="selectedGeievanceId"></td>
												<td><input name="grievanceCategory" type="hidden" value=""
														id="grievanceCategory" autocomplete="off"></td>
											</tr>
									<tr id="personalNumberRow">
									    <td style="width: 20%"><span>Personal Number</span><span class="mandatory"> *</span></td>
												<td>
													<input name="personalNo" type="text" value="" id="personalNo"
														autocomplete="off"
														onkeyup="this.value=this.value.toUpperCase();"
														onblur="personalNoValidation()">
												</td>
											</tr>


										</tbody>
									</table>
								</div>
							</div>

						
							
							<div class="welcomebox" id="welcomeboxDivId">
								<div class="welcomeHead">
									<span>Frequently Asked Questions (FAQ)</span>
								</div>

								<div class="welcomecont" style="max-height: 200px; overflow-y: auto;">
									<table class="filtersearch" id="faqTableId"
										style="width: 100%; border-collapse: collapse;">
											<tbody class="all1">
											
											</tbody>
										</table>
									</div>

								
								<div class="welcomebox" style="margin-top: 1px;">
									<table class="filtersearch" style="width: 100%;">
										<tbody class="all1">
											<tr>
												<td style="width: 10%;">
													<b>Was your problem resolved by the above FAQ?</b>
												</td>
												<td style="width: 20%;">
													<label style="margin-right: 15px;">
													<input type="checkbox" id="faqCheckboxYes" name="faqCheckbox"
														value="0"
														 onchange="handleFaqCheckbox(this)" />
														YES
													</label>
													<label>
													<input type="checkbox" id="faqCheckboxNo" name="faqCheckbox"
														value="1" onchange="showtextAreaDiv(this)" />
														NO
													</label>
												</td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>


							
							<div class="welcomebox" id="textAreaDivId" style="display: none;">
								<div class="welcomebox">
									<table class="filtersearch">
										<tbody class="all1">
											<tr>
												<td><b>Please specify your query:</b></td>
											</tr>
										</tbody>
									</table>
								</div>

								<div class="welcomecont" style="padding-top: 50px">
									<textarea id="text_area" name="grievanceText" rows="5" class="responsive-textarea"
										style="resize:none"></textarea>
								</div>

								<div style="padding-bottom: 5px; padding-left: 5px">
									<label class="label lablevalue">Upload File</label>
								</div>
								<div style="padding-bottom: 5px; padding-left: 5px">
									<input type="file" class="filepicker" name="file" id="uploadFile"
										accept=".pdf, .jpg, .jpeg, .png" multiple  onchange="addSelectedFiles()"/>
									<button type="button" onclick="resetFile()">❌</button>
									
								</div>
								 <div id="selectedFiles" style="margin-top:10px; font-family:Arial; color: blue; font-size:0.95rem;"></div>
								<div style="padding-left: 5px; font-size: 13px; color: #d9534f; font-style: italic;">
									NOTE: Only PDF and image files (JPG, JPEG, PNG) are allowed (Max size: 1 MB).
								</div>

								<div style="padding: 5px">
									<button type="button" class="butn" onclick="validateField()" style="float: right;">
										Submit
									</button>
								</div>
							</div>
						</form>
					</div>

				</div>
			</div>
		</div>
	</section>

	<section>
		<div class="blank"></div>
	</section>

	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>



</body>

</html>
