function setTravellerName(index,passIndex){

	   var mySelect = $('#nonDTSPassDtlsTravellerName'+index+'_'+passIndex);
	   /*[# th:if="${claimView.travellers} != null"]*/
		/*[# th:each="src : ${claimView.travellers.travellerName}"]*/

	        $('<option></option>').val(/*[[${src.nameL}]]*/).html(/*[[${src.nameL}]]*/)
	    );
		 	/*[/]*/
	 	/*[/]*/

	}
 
function setTravellerRelationAndAge(val,index,passIndex){

	   if(!isTravellerExist(val,index)){return false;}

	   var mySelect = $('#nonDTSPassDtlsTravellerName'+index+'_'+passIndex);
	   /*[# th:if="${claimView.travellers} != null"]*/
		/*[# th:each="src : ${claimView.travellers.travellerName}"]*/
	   if(val==/*[[${src.nameL}]]*/''){
	     $("#nonDTSPassDtlsRelation"+index+"_"+passIndex).val(/*[[${src.relationL}]]*/'');
	     $("#nonDTSPassDtlsAge"+index+"_"+passIndex).val(/*[[${src.ageL}]]*/'');
	     return true;
	    }
		 	/*[/]*/
		/*[/]*/
	}
 
function setClassOfTravel(modeOfTravel, index){

	   takeNonDTSFlightInfo(modeOfTravel, index);
	   var mySelect = $('#nonDTSClassOfTravel'+index);
	   mySelect.find('option:not(:first)').remove();

		/*[# th:each="src : ${claimView.transportModes}"]*/
	    var travelMode=/*[[${src.transportModeVal}]]*/'';

	     if(modeOfTravel == travelMode){
			/*[# th:each="mode : ${src.travelClass}"]*/
	           mySelect.append(
			       $('<option></option>').val(/*[[${mode}]]*/{}).html(/*[[${mode}]]*/{})
			    );
	        	/*[/]*/
	     }
	 	/*[/]*/

	  if($('#nonDTS_From'+index).length){
			setAirportsAndRailStation(index);
		}
	   
	   if(modeOfTravel=='GovtTransport'){
	     $("#nonDTSJryAmount"+index).val(0);
	   }
	   
	 } 
 
function fillCity(thisValue,cityGrade,index) {

    $('#hotelCity'+index).val(thisValue);
 	$('#destinationCityGrade'+index).val(cityGrade);
 	setTimeout(function(){
 	$('#suggestionsDestCity'+index).hide();
 	}, 200);
 	$("#hotelAmount"+index).val("");

	/*[# th:each="src : ${claimView.cityGradeList}"]*/
 	  if(cityGrade == /*[[${src.cityGradeValue}]]*/''){
         document.getElementById("hotelDailyAmount"+index).value=/*[[${src.maxHotelAmnt}]]*/'';
       }
 	/*[/]*/

 	if($("#hotelOrMess"+index+" option:selected").val()=='Mess'){
 	
 	  if($("#messLevel"+index).val()=='Level A'){
 	     $("#hotelDailyAmount"+index).val($("#maxLeavelAMessAmt").val());
 	  }
 	  if($("#messLevel"+index).val()=='Level B'){
 	     $("#hotelDailyAmount"+index).val($("#maxLeavelBMessAmt").val());
 	  }
 	  if($("#messLevel"+index).val()=='Level C'){
 	     $("#hotelDailyAmount"+index).val($("#maxLeavelCMessAmt").val());
 	  }
 	}
}
