<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/login/head}"></head>
 <link rel="stylesheet" th:href="@{/css/common/autoSuggest.css}"> 
<script th:src="@{/js/common/dateOfRetirement.js(random=${session.jsToken})}"></script>
<script th:src="@{/js/MB/AddUsers/TransferIn/transferIn.js(random=${session.jsToken})}"></script>
<script type="text/javascript" th:src="@{/js/common/crypto.js}"></script>
</head>
<body
	oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">
<div th:insert="~{fragments/header/mainHeader}"></div>
	
		<section id="midpart" class="midpart">
			<div class="container-fluid">
				<div class="row">
					<div class="col-lg-2">
						<div id="navigation"></div>
						</div>
					<div class="col-lg-10">

						<div style="text-left: center; margin-left: 12%; color: #FF0000;">
							<span>For transfer in of Re-Employed Service Personnel in DSC service, Use 'Transfer In and Re-employment'</span>
					</div>

						<form th:action="@{saveTransferIn}" method="post" id="transferIn_Id">
							<input type="hidden" name="locationId" th:value="${locationId}">
							<input type="hidden" name="userId" id="userId">
							<input type="hidden" name="currentOfficeId" id="currentOfficeId">
								<input type="hidden" id="currentUnit" name="currentUnit">
								<input type="hidden" name="officename" th:value="${officename}">
							<input type="hidden" name="loginUserId" th:value="${loginUserId}">
							<div id="program" class="programBlock">
								<div class="welcomebox" style="margin-bottom:1rem;width:75%">
									<div class="welcomeHead">
										<span th:text="#{mb.addUser.transferin.tr.from.allunit}"></span>
									</div>
									<div class="welcomecont">
										<table id="filtersearch" class="filtersearch">
											<tbody class="all1">
												<tr>
													<td style="width: 30%"><span
														th:text="#{mb.addUser.transferin.personalNo}"></span> <span class="mandatory">*</span></td>
													<td style="width: 70%"><input name="personalNo"
														type="text" class="txtfldM" id="personalNo"
														 autocomplete="off" minlength=4 maxlength=11>
													<button type="button" name="proceed" class="butn" onclick="testForAlphaNumericKey(event)">Proceed</button>
													</td>
												</tr>
											</tbody>
										</table>
									</div>
									<div>
										<table class="filtersearch" style="width: 100%">
										<tbody class="">
											<tr>
												<td colspan="4" class="showalert"><div
														class="showalert" id="personalNoInfo"></div></td>
											</tr>
											</tbody>
										</table>
									</div>
								</div>
							</div>


							<input type="hidden" name="name" id="name"> <input
								type="hidden" name="unitService" id="unitService"> <input
								type="hidden" name="travelerService" id="travelerService">

							<div id="program2" class="welcomebox" style="width:75%;margin-bottom:1rem">
								<table id="filtersearch1" class="filtersearch">
									<tbody class="all1">
										<tr>
											<td><span th:text="#{mb.addUser.transferin.tos.date}"></span> <span class="mandatory">*</span></td>
											<td><div class="inpt-fields errorMessage">
											<input name="sosDateString" type="text"
												placeholder="dd/mm/yyyy" class="txtfldM" size="15"
												id="sosDate" autocomplete="off" readonly="readonly">
												</div>
												</td>
										
										</tr>
										<tr>
											<td><span th:text="#{mb.addUser.transferin.nrsDuty.station}"></span> <span class="mandatory">*</span></td>
											<td>
												<div class="inpt-fields errorMessage">
													<input type="text" style="width: auto;" class="txtfldM"
														id="dutyStations_0" name="nrsDutyStn"
														onblur="fillRecordRailStationNRS('',0)"
														onkeyup="filsRailStationNRS(this.value,0)"
														autocomplete="off">
													<div class="suggestionsBox"
														id="suggestionsRailStationNRS_0" style="display: none;">
														<div class="suggestionList"
															id="autoSuggestionsListRailStationNRS_0"></div>
													</div>
												</div>
											</td>
										</tr>
										<tr>
											<td><span th:text="#{mb.addUser.transferin.naDuty.station}"> </span><span class="mandatory">*</span></td>
											<td>
												<div class="inpt-fields errorMessage">
													<input type="text" class="txtfldM"
														id="airportStationText_0" name="dutyStnNa"
														onblur="fillRecordOffice('',0)"
														onkeyup="getStationAir(this.value,0)" autocomplete="off">

													<div class="suggestionsBox" id="suggestionsOfficeNRS1_0"
														style="display: none;">
														<div class="suggestionList"
															id="autoSuggestionsListOfficeNRS1_0"></div>
													</div>
												</div>
											</td>
										</tr>
										<tr>
											<td th:text="#{mb.addUser.transferin.isGov.Accomdation}"></td>
											<td><input id="isUnitInPeaceLoc" name="isUnitInPeaceLoc" class="peace"
												type="radio" value="Y" onclick="chkForGovtAccom('YES');">
												YES <input id="isUnitInPeaceLoc" name="isUnitInPeaceLoc" class="peace1"
												type="radio" value="N" onclick="chkForGovtAccom('NO');"
												checked="checked"> NO</td>
										</tr>
										<tr>
											<td th:text="#{mb.addUser.transferin.spr}"></td>
											<td>

												<div class="inpt-fields errorMessage">
													<input type="text" style="width: auto;" class="txtfldM"
														id="sprStation_0" name="sprSfa"
														onblur="fillSPRStation('',0)"
														onkeyup="sprStation(this.value,0)" autocomplete="off">
													<div class="suggestionsBox" id="suggestionsSPR_0"
														style="display: none;">
														<div class="suggestionList" id="autoSuggestionsListSPR_0"></div>
													</div>
												</div>


											</td>
										</tr>
										<tr>
											<td th:text="#{mb.addUser.transferin.spr.nrs}"></td>
											<td>
												<div class="inpt-fields errorMessage">
													<input type="text" style="width: auto;" class="txtfldM"
														id="sprStationNRS_0" name="sprNrs"
														onblur="fillSPRNRS('',0)" onkeyup="sprNRS(this.value,0)"
														autocomplete="off">
													<div class="suggestionsBox" id="suggestionsSPRNRS_0"
														style="display: none;">
														<div class="suggestionList"
															id="autoSuggestionsListSPRNRS_0"></div>
													</div>
												</div>

											</td>
										</tr>
										<tr>
											<td th:text="#{mb.addUser.transferin.spr.na}"></td>
											<td><div class="inpt-fields errorMessage">
													<input type="text" class="txtfldM" id="airPortSPRNAText_0"
														name="sprNa" onblur="fillRecordSPRNA('',0)"
														onkeyup="getSPRNA(this.value,0)" autocomplete="off">
													<div class="suggestionsBox" id="suggestionsSPRNA_0"
														style="display: none;">
														<div class="suggestionList"
															id="autoSuggestionsListSPRNA_0"></div>

													</div>
												</div></td>
										</tr>
										<tr>
											<td><span th:text="#{mb.addUser.transferin.transfer.autho}"></span> <span class="mandatory">*</span></td>
											<td><div class="inpt-fields errorMessage">
													<textarea name="reason" id="reason" rows="2" cols="25"
														onkeyup="ismaxlength(this,50);" autocomplete="off"> </textarea>
												</div></td>
										</tr>
										<tr>
											<td></td>

											<td><button id="transferBtnDiv" type="button"
													class="butn" onclick="confirmation()"
													style="display: none;">Transfer Traveler</button></td>
										</tr>
									</tbody>
								</table>
							</div>
						</form>
					</div>
				</div>
			</div>
		</section>
<section>
<div class="blank"></div>
</section>
		<section>
			<div th:insert="~{fragments/login/footer}"></div>
		</section>

</body>

</html>
