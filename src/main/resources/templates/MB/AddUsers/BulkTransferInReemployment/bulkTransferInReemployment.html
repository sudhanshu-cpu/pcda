<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>
<link rel="stylesheet" th:href="@{/css/common/style.css}">
<link rel="stylesheet" th:href="@{/css/common/autoSuggest.css}">
<script th:src="@{/js/MB/AddUsers/UnitMovement/getStation.js(random=${session.jsToken})}"></script>
<script th:src="@{/js/MB/AddUsers/UnitMovement/getAirport.js(random=${session.jsToken})}"></script>
<script th:src="@{/js/MB/AddUsers/bulkTransferInReemployment/bulkTransferInReemployment.js(random=${session.jsToken})}"></script>
<script
	th:src="@{/js/common/dateOfRetirement.js(random=${session.jsToken})}">
</script>
<body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">

<!-- 	<div class="container-fluid"> -->
		<div th:insert="~{fragments/header/mainHeader}">...</div>

		<section id="midpart" class="midpart">
			<div class="container-fluid">
				<div class="row">

				<div class="col-lg-1"></div>
				<div class="col-lg-10">
						<form th:action="@{createBulkTransferInReEmp}" method="post" 
							id="saveBulkTransferInReEmpMovement">
                            <input type="hidden" id="currentUnit" name="currentUnit">
                             <input type="hidden" id="groupString" name="groupString" /> 
                             <input type="hidden" name="retireAgePbor" th:value="${retirAgePBOR}" id="retireAgePbor" /> 
                             <input type="hidden" name="retireAgeOther" th:value="${retirAgeOther}" id="retireAgeOther" /> 
                             <input type="hidden" id="retireAge" name="retireAge" /> 
                             <input type="hidden" id="transferInFormId" value="true" />                        
							<input type="hidden" name="loginUserId" th:value="${loginUserId}">
							
										<div id="program" class="programBlock">
							<div class="welcomebox">
								<div class="welcomeHead">
													<p>Transfer In & Reemployment</p>
												</div>
								<div class="welcomecont">
									<table class="filtersearch">
										<tbody class="all1">
															<tr>
																<td colspan="6"></td>
															</tr>
															<tr>
																<td></td>
															</tr>
														<!-- tr for Service And UnitName-->	
															<tr>
																<td><span th:text="#{mb.addUser.transferinreemployement.service}"></span>
																	<span class="mandatory">*</span>
																</td>
																<td><select name="serviceId" id="alternateService" class="combo"
																		style="width:70%">
																		<option value="">Select</option>
																		<option th:text="${list.serviceName}" th:each="list:${serviceList}" th:value="${list.serviceId}"></option>
																	</select></td>
																<td><span th:text="#{mb.addUser.transferinreemployement.unit}"></span>
																	<span class="mandatory">*</span>
																</td>
																<td id="unitTdId">
															
																	<input type="text" th:value="${name}" readonly="readonly" style="border: none;" name="loginUserUnitName" id="unitNo">
															
															
																</td>
															</tr>
															<!-- tr for Category And Level-->		
																<tr>
																	<td><span th:text="#{mb.addUser.transferinreemployement.cat.name}"></span>
																		<span class="mandatory">*</span>
																	</td>
																	<td><select name="categoryId" id="category_Id" style="width:70%" class="combo">
																			<option value="">Select</option>
																		</select></td>
																	<td><span th:text="#{mb.addUser.transferinreemployement.level.name}"></span>
																		<span class="mandatory">*</span>
																	</td>
																	<td><select id="levelId" class="combo" name="levelId" style="width:70%">
																			<option value="">Select</option>
																		</select> 
																
																		<span id="rank" class="mandatory"></span> <input type="hidden" id="rankId" name="rankId">
																	</td>
																
																</tr>
																
																	<tr>
																		<td><span th:text="#{mb.addUser.transferinreemployement.rail.ac.off}"></span>
																			<span class="mandatory">*</span>
																		</td>
																		<td><select name="railPayAcOff" id="payAcOff" class="combo" style="width:70%">
																				<option value="-1">Select</option>
																			</select></td>
																		<td><span th:text="#{mb.addUser.transferinreemployement.air.ac.off}"></span>
																			<span class="mandatory">*</span>
																		</td>
																		<td><select name="airPayAcOff" id="airAcOff" class="combo" style="width:70%">
																				<option value="-1">Select</option>
																			</select></td>
																	</tr>
															
															<tr>
																<td style="width: 30%"><label th:text="#{mb.addusers.unitmovement.nrs}"></label>
																	<span class="mandatory">*</span>
																</td>
																<td><input class="txtfldM" type="text" style="width: auto;" id="dutyStations_0" name="unitRailDutyNrs"
																		onblur="fillRecordRailStationNRS('',0)" onkeyup="filsRailStationNRS(this.value,0)" autocomplete="off">
																	<div class="suggestionsBox" id="suggestionsRailStationNRS_0" style="display: none;">
																		<div class="suggestionList" id="autoSuggestionsListRailStationNRS_0"></div>
																	</div>
																</td>
															
												
															</tr>
															<tr>
																<td style="width: 30%" th:text="#{mb.addusers.unitmovement.nrsairport}"></td>
																<td colspan="3"><input type="text" class="txtfldM"
																	id="airportStationText_0" name="unitDutyStnNa"
																	onblur="fillRecordOffice('',0)"
																	onkeyup="getStationAir(this.value,0)" autocomplete="off">

																	<div class="suggestionsBox"
																		id="suggestionsOfficeNRS1_0" style="display: none;">
																		<div class="suggestionList"
																			id="autoSuggestionsListOfficeNRS1_0"></div>
																	</div></td>
															</tr>
															<tr>
																<td style="width: 30%" th:text="#{mb.addusers.bulktransferin.date}"></td>
																<td colspan="3"><input name="unitRelocationDateStr"
																	placeholder="dd-mm-yyyy" type="text" class="txtfldM"
																	id="unitRelocationDate" autocomplete="off" readonly="readonly"></td>
															</tr>
															<tr>
																<td style="width: 30%"th:text="#{mb.addusers.bulktransferin.authority}"></td>
																<td colspan="3"><textarea name="unitMoveAuthority"
																		class="txtfldM" onkeyup="ismaxlength(this,50);"
																		id="unitMoveAuthority" rows="2" cols="25"></textarea>
																</td>
															</tr>
															<tr>

																<td colspan="6" style="text-align: right">
																	<button class="butn" type="button" onclick="transferOutReemployment()">Submit</button>
																</td>
															</tr>
														</tbody>
													</table>
												</div>
											</div>
										</div>


						</form>
					</div>

				</div>

			</div>

		</section>
		<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
		</section>
</body>

</html>
