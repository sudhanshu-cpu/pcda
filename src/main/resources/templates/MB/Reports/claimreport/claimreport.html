<!DOCTYPE html>
<html  lang="en" xmlns:th="http://www.thymeleaf.org">
<head  th:insert="~{fragments/login/head}"></head>
<script type="text/javascript">
	
$(document).ready(function(){
	
    $('#formtxt').DataTable({
searching: false,
info: false,
ordering:false
    });
});
function encryptPNo(){
	var prsnlNo = $("#personalNo").val().trim();
	
	if(prsnlNo!=''){
		var encryptPNo = CryptoJS.AES.encrypt(prsnlNo,"Hidden Pass");
		$("#personalNo").val(encryptPNo);
}
}

</script>
<script type="text/javascript" th:src="@{/js/common/crypto.js}"></script>
<body>
<div th:insert="~{fragments/header/mainHeader}"></div>

<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1"></div>
				<div class="col-lg-10">

<form name="budgetRptFilter" id="budgetRptFilter"   th:formaction="@{/reports/postclaimReport}" th:method="post" >

     <input type="hidden" name="event" id="event" value="next"/>
	 <div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;">
								<div class="welcomeHead">
									<p th:text="#{mb.reports.claimreport.claimReports}"></p>
								</div>

								<div class="welcomecont">
         <table class="filtersearch">
			<tbody class="all1">
			
            <tr>
           		<td><span th:text="#{mb.reports.claimreport.claim.id}"></span> </td>
				<td><input type="text" name="claimId" id="claimId" class="txtfldM" size="15" maxlength="20"  th:value="${claimReportInputModel.claimId}" autocomplete="off" /> </td>
				
				<td><span th:text="#{mb.reports.claimreport.personalNo}"></span> </td>
				<td><input type="text" name="personalNo" id="personalNo" class="txtfldM" size="15" maxlength="20" th:value="${claimReportInputModel.personalNo}"  autocomplete="off"/></td>
			
			  	<td><span th:text="#{mb.reports.claimreport.travelType}"></span> </td>
			 	<td>  
				 	<select name="travelType" id="travelType" class="combo" style="width: 100%;">
                                                    <option value="">All</option>
                                                    <option th:selected="${claimReportInputModel.travelType}==${src.travelTypeId}" th:each=" src : ${travelTypeList}" th:text="${src.travelName}" th:value="${src.travelTypeId}"></option>
                                                </select>
				</td>
				
				<td><span th:text="#{mb.reports.claimreport.accountOffice}">  </span> </td>
				<td>	   
					<select  name="accountOffice" id="accountOffice" class="combo" style="width: 33%;">
                                                    <option value="">All</option>
                                                    <option th:selected="${claimReportInputModel.accountOffice}==${acc.key}" th:each=" acc : ${accountOfficeMap}" th:text="${acc.value}"  th:value="${acc.key}" > </option>
                                                </select>
                                                
					
				</td>
			
			
			<td> <span th:text="#{mb.reports.claimreport.unitOffice}"> </span>   </td>
			  <td>
				 <input type="hidden" th:value="${groupID}"  th:text="${name}"  name="groupId" ></input>
			 </td>
			 
			</tr>
		<tr>
		  <td colspan="10" id="downLoadFile" style="text-align:right">
		    <a href="javascript:void(0);"><input id="generateButton" class="butn" type="submit" onclick="encryptPNo();" th:formaction="@{/reports/postclaimReport}" th:formmethod="post" value="Generate Report"/></a>
		  </td>
		</tr> 
	 </tbody>
	 </table>
	 </div>
	 </div>
	 </div>
	 
         <div id="claimDetailsTR"> 
          <div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;"  th:if="${not #lists.isEmpty(claimReportList)}" >
								
			 <table id="formtxt" class="filtersearch">
			 <thead class="head">
	    <tr>
				 	 <th> <span th:text="#{mb.reports.claimreport.sno}"></span>  </th>
					 <th> <span th:text="#{mb.reports.claimreport.claim.id}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.personalNo}"></span> </th>  
					 <th> <span th:text="#{mb.reports.claimreport.accountOffice}"></span></th>
					 <th> <span th:text="#{mb.reports.claimreport.unitOffice}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.travelType}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.advance.amount}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.claim.amount}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.due.amount}"></span> </th>
					 <th> <span th:text="#{mb.reports.claimreport.approvalState}"></span> </th>
				</tr>
				</thead>
				<tbody class="all1">
				 <tr th:each = "data : ${claimReportList}"> 
                                                      <td th:text="${dataStat.index+1}"></td>				                                       
                                                      <td th:text="${data.claimId}"></td>
                                                      <td th:text="${data.personalNo}"></td>
                                                      <td th:text="${data.accountOfficeName}"></td>
                                                        <td  th:text="${name}"></td>
                                                      <td th:text="${data.travelTypeName}"></td>
                                                      <td th:text="${data.totalClaimAmount}"></td>
                                                      <td th:text="${data.totalSpentAmount}"></td>
                                                      <td th:text= "${data.refundAmount}"></td>
                                                      <td  th:text="${data.approvalState}"></td>
                                                     
                   
                   
                                                   </tr>
                                                   	  </tbody>
 </table>
	  

	  
  </div>
	   <table class="filtersearch">
         <tr>
         <td th:text="${norecordfound}" class=errors id="noRecFound" colspan="5"> </td>
	  </tr>
 </table>  
        
  
   </div>    		
  </div>

     		
</form>
</div>
</div>
</div>
   </section>
	<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
   </section>
</body>
</html>
