<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">



<body
	oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">

	<form>
		<div id="program" class="programBlock">
			<div class="welcomebox">
				<div class="welcomeHead">
					<p>Acknowledgement History</p>

				</div>
				<div class="welcomecont" style="margin: 0">
					<table id="filtersearch" class="filtersearch">
						<tbody class="all1">
							<tr>
								<td>
									<table class="filtersearch">
										<tbody class="allp">
											<tr th:if="${#lists.isEmpty(ackHistoryList)}">
												<td class="errors" style="padding: 6px;">Acknowledgement
													History Not Found.</td>
											</tr>

											<tr th:unless="${#lists.isEmpty(ackHistoryList)}">
											<td>
													<table class="filtersearch">
														<tbody class="allp">
															<tr>
																<td class="lablevalue"
																	th:text="#{cda.transactionsettlement.voucherack.sqn}"></td>
																<td class="lablevalue"
																	th:text="#{cda.transactionsettlement.voucherack.acknum}">
																</td>
																<td class="lablevalue"
																	th:text="#{cda.transactionsettlement.voucherack.paidamt}">
																</td>
																<td class="lablevalue"
																	th:text="#{cda.transactionsettlement.voucherack.ackdatee}">
																</td>
																<td class="lablevalue"
																	th:text="#{cda.transactionsettlement.voucherack.file}">
																</td>
													</tr>

															<tr th:each="src : ${ackHistoryList}">
																<td th:text="${src.seqNo}"></td>
																<td th:text="${src.ackNo}"></td>
																<td th:text="${src.paidAmount}">1212</td>
																<td th:text="${src.paymentDate}"></td>
																<td><button type="submit"
																		th:formaction="@{/com/downloadFile}" th:formmethod="get"
																		th:value="${src.ackFilePath}"
																		style="border: none; color: blue; text-decoration: underline; background-color: white;"
																		name="dwnFilePath">Download</button></td>
														</tr>

														</tbody>
												</table>
											</td>
										</tr>
										</tbody>
							</table>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</form>
</body>

</html>
