<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>


<script type="text/javascript"> 
function submitRequestForm(claimOId,event){

    $("#claimOId").val(claimOId);
	$("#approveDisApproveAction").val(event);
	//$("#submitType").val(submitType);
	
	var isArmedForce=$("#isArm").val();
	
	if(isArmedForce=='1'){
	     if(event=='approve'){
		  if(!$("#co_counter_signed1").is(":checked")){
		     alert("Please Checked Counter Signed");
		     return false;
		  }
		  $("#approveDisApproveForm").submit(); 
		 }
	}else{
	if(event=='approve'){
	  if(!$("#co_counter_signed1").is(":checked") || !$("#co_counter_signed2").is(":checked")){
	     alert("Please Checked Counter Signed");
	     return false;
	  }
	  $("#approveDisApproveForm").submit(); 
	 }
	}
     
	
	if(event=='disapprove'){
		  if(!$("#co_counter_signed1").is(":checked") || !$("#co_counter_signed2").is(":checked")){
			     alert("Please Checked Counter Signed");
			     return false;
			  }
	var MixDiv=document.getElementById("MixDiv");
	MixDiv.style.display='none'; 
	var disAppDiv=document.getElementById("disApproveDiv");
	disAppDiv.style.display='block';
	return true;
  }
}

function submitDisapprove(id)
{
    var disapproveDetail=document.getElementById("disaproveReason").value;
    
	if(disapproveDetail.trim()=='')
	{
		alert("Please Enter Reason for Disapproval.");
		document.getElementById("disaproveReason").focus();
		return false;
	}
	$("#disaproveReasons").val(disapproveDetail);
	$("#approveDisApproveForm").submit();
}
function viewMainClaimDetails(mainClaimId)
{
	var that = this;
    ajaxRequestFace = new LightFace.Request(
    {
		width: 1100,
		height: 500,
		url: $("#context_path").val() + "co/viewClaimDetailsApprove",
		buttons: [
			{ title: 'Close', event: function() { this.close(); } }
		],
		request: { 
			data: { 
				tadaClaimId: mainClaimId,
			},
			method: 'post'
			
		},
		title: 'Claim View'
			 
	});
    ajaxRequestFace.open();
}

</script>
