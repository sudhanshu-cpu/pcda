<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>

<script>
function approveTransferIn(event,userId,userAlias,currentUnit,transferTo,sequence){

$("#userId").val(userId);
$("#transferTo").val(transferTo);
$("#sequence").val(sequence);
$("#event").val(event);
$("#personalNo").val(userAlias);
$("#approveTraInForm").submit();
}

function trim(n)
	{
   		return n.replace(/^\s+|\s+$/g,'');
	}
	
	function isEmpty(value)
	{
		return value==null||""==value;
	}
	
function submitRequestForm(userId,event,seqNo,oldUnit){

	var reqTransFerInDiv=document.getElementById("reqTransFerInDiv");
	var disAppDiv=document.getElementById("disApproveDiv");
	
	if(event=="disapprove"){
		document.getElementById("userId").value=userId;
		document.getElementById("sequence").value=seqNo;
		document.getElementById("transferTo").value=oldUnit;
		//document.getElementById("personalNo").value=userAlias;
		reqTransFerInDiv.style.display='none';
		disAppDiv.style.display='block';
		return true;
	}

}

function submitDisapprove(formAction,event){

	var submitForm=document.createElement("form");
	var disapproveDetail=document.getElementById("disapproveDetail").value;
	var disapproveUserAlias=document.getElementById("personalNo").value;
	var seqNo=document.getElementById("sequence").value;
	var oldUnit=document.getElementById("transferTo").value;
	document.getElementById("event").value=event;
	if(isEmpty(trim(disapproveDetail))){
		alert("Please enter reason to disapprove");
		document.getElementById("disapproveDetail").focus();
		return false;
	}
	document.body.appendChild(submitForm);
	submitForm.method = "POST";
	
	var hiddenElement =document.createElement('input');
	hiddenElement.name="userAlias";
	hiddenElement.id="userAlias";
	hiddenElement.type="hidden";
	hiddenElement.value =disapproveUserAlias;
	
	submitForm.appendChild(hiddenElement);
	
	var hiddenIndex =document.createElement('input');
	hiddenIndex.name="seqNo";
	hiddenIndex.id="seqNo";
	hiddenIndex.type="hidden";
	hiddenIndex.value =seqNo;
	
	submitForm.appendChild(hiddenIndex);
	
	var hiddenEeven =document.createElement('input');
	hiddenEeven.name="event";
	hiddenEeven.id="event"; 
	hiddenEeven.type="hidden";
	hiddenEeven.value =event;
	submitForm.appendChild(hiddenEeven);
	
	var hiddenReason =document.createElement('input');
	hiddenReason.name="disapproveDetail";
	hiddenReason.id="disapproveDetail"; 
	hiddenReason.type="hidden";
	hiddenReason.value =disapproveDetail;
	submitForm.appendChild(hiddenReason);
	
	var hiddenOldUnit =document.createElement('input');
	hiddenOldUnit.name="oldUnitDetail";
	hiddenOldUnit.id="oldUnitDetail"; 
	hiddenOldUnit.type="hidden";
	hiddenOldUnit.value =oldUnit;
	submitForm.appendChild(hiddenOldUnit);
	
	
	submitForm.action=formAction.replace('/page', "");
	$("#approveTraInForm").submit();
}

// 	reqPoolDiv.style.display='block';
// 	disAppDiv.style.display='none';

//   }

</script>
