<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>

<script>
	function showUnitDetails(serviceId) {

			if (serviceId != '') {

				$("#unitServiceId").val(serviceId);
				$("#adgUnitAndEstblishmntDetails").submit();
			}
		}
		
		function validate() {

				if ($("#serviceId").val() == "") {
					alert("Please Select Service !!");
					return false;
				} else {
					$("#adgUnitAndEstblishmntReportForm").submit();
				}
			}
</script>
<body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">

<form th:action="@{/adg/getUnitsAndEstablishmentsReportDetails}" method="post" name="adgUnitAndEstblishmntDetails"
						id="adgUnitAndEstblishmntDetails">
		<input type="hidden" name="service" id="unitServiceId"/>			
</form>

	<div th:insert="~{fragments/header/mainHeader}"></div>
	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1">
					<div id="navigation"></div>
				</div>


				<div class="col-lg-10">

					<form th:action="@{/adg/getUnitsAndEstablishmentsReportData}" method="post" name="adgUnitAndEstblishmntReportForm"
						id="adgUnitAndEstblishmntReportForm">

						<div id="program" class="programBlock">
							<div class="welcomebox" style="margin-bottom: 1rem;">
								<div class="welcomeHead">
									<p th:text="#{adg.reports.unitandestablishment.report.title}"></p>
								</div>
								<div class="welcomecont">
									<table class="filtersearch" cellspacing="1" cellpadding="4" width="100%" border="0">
										<tbody class="all1">
											<tr align="left">
												<td>Service</td>
												<td><select name="serviceId" class="comboM" id="serviceId">

														<option value="">Select</option>
														<option th:each=" src : ${serviceMap}" th:text="${src.value}"
															th:selected="${src.key} == ${serviceId}"
															th:value="${src.key}">
														</option>

													</select></td>
											
												<td colspan="8" class="lablevalue" style="text-align: right;">
													<button type="button" value="" class="butn" onclick="validate();"
														>
														Generate Report</button>
												</td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>
					</form>
<!--					 it is used for display data on same page  -->
		<div class="welcomebox"
        th:if="${unitData != null}">
						<table id="data_info_list" class="filtersearch" width="100%" cellspacing="1" cellpadding="4"
							border="0" align="center">
							<thead class="head">
								<tr>
									<th style="text-align: center;">Unit Count</th>
									<th style="text-align: center;">Master Booker Count</th>
									<th style="text-align: center;">Commanding Officer Count</th>
									<th style="text-align: center;">Traveler Count</th>
									
								</tr>
							</thead>
							<tbody>
								<tr>
									<td style="text-align: center;"><a href="#" class="links" th:text="${unitData.unitCount}"
														th:attr="onclick='showUnitDetails(\''+${serviceId}+'\')'">
													</a> </td>
									<td style="text-align: center;" th:text="${unitData.mbCount}"></td>
									<td style="text-align: center;" th:text="${unitData.coCount}"></td>
									<td style="text-align: center;" th:text="${unitData.travelerCount}"></td>
									
								</tr>
							</tbody>
						</table>

					</div>
					<div>
						<p class="errors" th:text="${Errormessage}" style="margin-bottom:0"></p>
					</div>
					<div>
						<p class="errors" th:text="${validationErrorMsg}" style="margin-bottom:0"></p>
					</div>

				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>
</body>

</html>
