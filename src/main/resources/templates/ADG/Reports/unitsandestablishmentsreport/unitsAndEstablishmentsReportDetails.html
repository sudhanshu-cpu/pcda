<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{fragments/login/head}"></head>


<body oncontextmenu="javascript:alert('Mouse Right Click is blocked');false;">



	<div th:insert="~{fragments/header/mainHeader}"></div>
	<section id="midpart" class="midpart">
		<div class="container-fluid">
			<div class="row">
				<div class="col-lg-1">
					<div id="navigation"></div>
				</div>


				<div class="col-lg-10">



					<div id="program" class="programBlock">
						<div class="welcomebox" style="margin-bottom: 1rem;">
							<div class="welcomeHead">
								<p th:text="#{adg.reports.unitandestablishment.report.dtls}"></p>
							</div>
							<div class="welcomecont" th:if="${unitDetails != null and !#lists.isEmpty(unitDetails)}">
								<table id="data_info_list" class="filtersearch" width="100%" cellspacing="1"
									cellpadding="4" border="0" align="center">
									<thead class="head">
										<tr>
											<th style="text-align: center;">Unit Name</th>
											<th style="text-align: center;">Master Booker Count</th>
											<th style="text-align: center;">Commanding Officer Count</th>
											<th style="text-align: center;">Traveler Count</th>

										</tr>
									</thead>
									<tbody class="all1">
										<tr th:each="unitData : ${unitDetails}">
											<td style="text-align: center;" th:text="${unitData.unitName}"></td>
											<td style="text-align: center;" th:text="${unitData.mbCount}"></td>
											<td style="text-align: center;" th:text="${unitData.coCount}"></td>
											<td style="text-align: center;" th:text="${unitData.travelerCount}"></td>

										</tr>
									</tbody>
								</table>

							</div>
						</div>
					</div>

					<div th:unless="${unitDetails != null and !#lists.isEmpty(unitDetails)}">
						<p class="errors" style="margin-bottom:0">Unable to get your report, please try again !!</p>
					</div>


				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="blank"></div>
	</section>
	<section>
		<div th:insert="~{fragments/login/footer}"></div>
	</section>
</body>

</html>
